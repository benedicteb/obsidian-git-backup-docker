# =============================================================================
# Docker Hub Publish Workflow
#
# Triggers on every push to main. Determines the next semantic version by
# parsing conventional commit messages since the last tag, creates a git tag,
# and pushes both :latest and :vX.Y.Z to Docker Hub.
#
# Required GitHub secrets:
#   DOCKERHUB_USERNAME — Docker Hub username
#   DOCKERHUB_TOKEN   — Docker Hub access token (not password)
# =============================================================================

name: Docker Publish

on:
  push:
    branches: [main]

# Prevent concurrent builds for the same branch
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: benedicteb/obsidian-git-backup

jobs:
  version-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push git tags

    steps:
      # -----------------------------------------------------------------
      # Checkout with full history (needed for tag detection + commit log)
      # -----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------
      # Determine next semantic version from conventional commits
      #
      # Rules:
      #   - feat:           → minor bump (0.1.0 → 0.2.0)
      #   - fix:, perf:     → patch bump (0.1.0 → 0.1.1)
      #   - BREAKING CHANGE → major bump (0.1.0 → 1.0.0)
      #   - docs:, chore:, refactor:, etc. → patch bump (still a release)
      #
      # If no tags exist, starts at v0.1.0.
      # -----------------------------------------------------------------
      - name: Determine next version
        id: version
        run: |
          # Get the latest semver tag, or default to v0.0.0 (so first bump
          # produces v0.1.0 for a feat: or v0.0.1 for a fix:)
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
            COMMIT_RANGE="HEAD"
            echo "No existing tags found. Starting from v0.0.0."
          else
            COMMIT_RANGE="${LATEST_TAG}..HEAD"
            echo "Latest tag: ${LATEST_TAG}"
          fi

          # Parse version components
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Scan commit messages for bump signals
          BUMP="patch"  # default

          COMMITS=$(git log --pretty=format:"%s%n%b" "$COMMIT_RANGE" 2>/dev/null || git log --pretty=format:"%s%n%b")

          if echo "$COMMITS" | grep -qiE "BREAKING[- ]CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?!?:"; then
            BUMP="minor"
          fi

          # Apply bump
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "Bump type: ${BUMP}"
          echo "New version: ${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------
      # Create and push git tag
      # -----------------------------------------------------------------
      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      # -----------------------------------------------------------------
      # Set up Docker Buildx (required for multi-platform builds)
      # -----------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------
      # Authenticate to Docker Hub
      # -----------------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------
      # Build and push multi-platform image
      #
      # Tags:
      #   - benedicteb/obsidian-git-backup:latest
      #   - benedicteb/obsidian-git-backup:vX.Y.Z
      # -----------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Embed version label in image metadata
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # -----------------------------------------------------------------
      # Sync README to Docker Hub description
      # -----------------------------------------------------------------
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
