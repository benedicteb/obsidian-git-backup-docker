# =============================================================================
# Docker Hub Publish Workflow
#
# Triggers on every push to main. Determines the next semantic version by
# parsing conventional commit messages since the last tag, builds and pushes
# both :latest and :vX.Y.Z to Docker Hub, then creates a GitHub Release
# with a categorised changelog.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — Docker Hub username
#   DOCKERHUB_TOKEN   — Docker Hub access token (not password)
#
# Versioning rules (conventional commits):
#   - feat!: or BREAKING CHANGE in body → major bump (0.1.0 → 1.0.0)
#   - feat:                             → minor bump (0.1.0 → 0.2.0)
#   - fix:, docs:, chore:, etc.        → patch bump (0.1.0 → 0.1.1)
#
# Note: every push to main creates a release. Use [skip ci] in commit
# message to skip if needed.
# =============================================================================

name: Docker Publish

on:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch. Newer push wins.
# This prevents race conditions where two runs compute the same version tag.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: benedicteb/obsidian-git-backup

jobs:
  version-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # Needed to create GitHub Releases (which create git tags)

    steps:
      # -----------------------------------------------------------------
      # Checkout with full history (needed for tag detection + commit log)
      # -----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------
      # Preflight: verify required secrets are configured
      # -----------------------------------------------------------------
      - name: Check required secrets
        env:
          HAS_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          HAS_TOKEN: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          set -euo pipefail
          missing=""
          if [ "$HAS_USERNAME" != "true" ]; then missing="$missing DOCKERHUB_USERNAME"; fi
          if [ "$HAS_TOKEN" != "true" ]; then missing="$missing DOCKERHUB_TOKEN"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub secrets:$missing"
            echo "::error::Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      # -----------------------------------------------------------------
      # Determine next semantic version from conventional commits
      #
      # Scans commits since the last vN.N.N tag. Tags with pre-release
      # suffixes (e.g., v1.0.0-rc1) are ignored.
      # -----------------------------------------------------------------
      - name: Determine next version
        id: version
        run: |
          set -euo pipefail

          # Get the latest strict semver tag (vN.N.N only, no pre-release)
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1 || true)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
            COMMIT_RANGE="HEAD"
            echo "No existing tags found. Starting from v0.0.0." >&2
          else
            COMMIT_RANGE="${LATEST_TAG}..HEAD"
            echo "Latest tag: ${LATEST_TAG}" >&2
          fi

          # Parse version components
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(printf '%s' "$VERSION" | cut -d. -f1)
          MINOR=$(printf '%s' "$VERSION" | cut -d. -f2)
          PATCH=$(printf '%s' "$VERSION" | cut -d. -f3)

          # Validate parsed components are integers
          case "${MAJOR}${MINOR}${PATCH}" in
            *[!0-9]*)
              echo "::error::Could not parse semver from tag '${LATEST_TAG}' (got ${MAJOR}.${MINOR}.${PATCH})"
              exit 1
              ;;
          esac

          # Scan commit subjects and bodies for bump signals
          BUMP="patch"  # default: any commit is at least a patch release

          COMMITS=$(git log --pretty=format:"%s%n%b" "$COMMIT_RANGE")

          # Breaking change: footer "BREAKING CHANGE:" or type suffix "!"
          if printf '%s\n' "$COMMITS" | grep -qiE "BREAKING[- ]CHANGE" || \
             printf '%s\n' "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:"; then
            BUMP="major"
          elif printf '%s\n' "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          # Apply bump
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "Bump type: ${BUMP}" >&2
          echo "New version: ${NEW_VERSION}" >&2
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "commit_range=${COMMIT_RANGE}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------
      # Set up Docker Buildx (required for multi-platform builds)
      # -----------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------
      # Authenticate to Docker Hub
      # -----------------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------
      # Build and push multi-platform image
      #
      # Tags:
      #   - benedicteb/obsidian-git-backup:latest
      #   - benedicteb/obsidian-git-backup:vX.Y.Z
      #
      # The git tag is created AFTER the build succeeds to avoid orphaned
      # tags (a tag with no corresponding Docker image).
      # -----------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # -----------------------------------------------------------------
      # Generate changelog from conventional commits since last tag
      #
      # Groups commits by type (features, fixes, other) and formats
      # them as a Markdown list for the GitHub Release body.
      # -----------------------------------------------------------------
      - name: Generate changelog
        id: changelog
        env:
          COMMIT_RANGE: ${{ steps.version.outputs.commit_range }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          CHANGELOG_FILE=$(mktemp)

          # Categorise commits by conventional commit type into temp files
          git log --pretty=format:"%s" "$COMMIT_RANGE" -- | while IFS= read -r subject; do
            [ -z "$subject" ] && continue

            # Check for breaking changes (trailing ! before colon)
            if printf '%s' "$subject" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              printf '%s\n' "$subject" >> "${CHANGELOG_FILE}.breaking"
            elif printf '%s' "$subject" | grep -qE '^feat(\(.+\))?:'; then
              printf '%s\n' "$subject" >> "${CHANGELOG_FILE}.feat"
            elif printf '%s' "$subject" | grep -qE '^fix(\(.+\))?:'; then
              printf '%s\n' "$subject" >> "${CHANGELOG_FILE}.fix"
            else
              printf '%s\n' "$subject" >> "${CHANGELOG_FILE}.other"
            fi
          done

          # Also check commit bodies for BREAKING CHANGE footer
          if [ ! -s "${CHANGELOG_FILE}.breaking" ]; then
            if git log --pretty=format:"%b" "$COMMIT_RANGE" -- | grep -qiE "BREAKING[- ]CHANGE"; then
              echo "See commit messages for breaking change details" > "${CHANGELOG_FILE}.breaking"
            fi
          fi

          # Build the changelog
          {
            if [ "$PREVIOUS_TAG" = "v0.0.0" ]; then
              printf 'First release.\n\n'
            else
              printf 'Changes since %s:\n\n' "$PREVIOUS_TAG"
            fi

            if [ -s "${CHANGELOG_FILE}.breaking" ]; then
              printf '### Breaking Changes\n\n'
              sed 's/^/- /' "${CHANGELOG_FILE}.breaking"
              printf '\n'
            fi

            if [ -s "${CHANGELOG_FILE}.feat" ]; then
              printf '### Features\n\n'
              sed 's/^/- /' "${CHANGELOG_FILE}.feat"
              printf '\n'
            fi

            if [ -s "${CHANGELOG_FILE}.fix" ]; then
              printf '### Fixes\n\n'
              sed 's/^/- /' "${CHANGELOG_FILE}.fix"
              printf '\n'
            fi

            if [ -s "${CHANGELOG_FILE}.other" ]; then
              printf '### Other\n\n'
              sed 's/^/- /' "${CHANGELOG_FILE}.other"
              printf '\n'
            fi

            printf '**Docker image:** `docker pull %s:%s`\n' "$IMAGE" "$NEW_VERSION"
          } > "$CHANGELOG_FILE"

          # Clean up temp category files
          rm -f "${CHANGELOG_FILE}.breaking" "${CHANGELOG_FILE}.feat" \
                "${CHANGELOG_FILE}.fix" "${CHANGELOG_FILE}.other"

          # Output the changelog file path for the release step
          echo "changelog_file=${CHANGELOG_FILE}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------
      # Create GitHub Release with changelog (after build succeeds)
      #
      # Uses the GitHub CLI to create a release, which also creates and
      # pushes the git tag. Placed after the Docker build so that a
      # failed build does not leave an orphaned version tag.
      # -----------------------------------------------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_FILE: ${{ steps.changelog.outputs.changelog_file }}
        run: |
          set -euo pipefail
          gh release create "$NEW_VERSION" \
            --title "$NEW_VERSION" \
            --notes-file "$CHANGELOG_FILE" \
            --target "${{ github.sha }}"

