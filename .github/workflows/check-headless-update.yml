# =============================================================================
# obsidian-headless Update Checker
#
# Runs daily at 08:00 UTC. Checks the npm registry for a newer version of
# obsidian-headless than what is pinned in the Dockerfile. If a new version
# exists, opens a PR with:
#   - The Dockerfile version bump
#   - Changelog entries from upstream (obsidianmd/obsidian-headless)
#   - Dependency diff (added/removed/changed npm dependencies)
#   - Links to the upstream commit comparison
#
# The PR is not auto-merged — the maintainer reviews the changes and decides
# whether to merge. This is intentional: obsidian-headless is pre-stable
# (0.x) and breaking changes can land in any release.
#
# If an update PR already exists (same branch name), the workflow skips
# creating a duplicate.
#
# No secrets required beyond the default GITHUB_TOKEN.
#
# On failure: GitHub sends an email to the repository owner. Check the
# Actions tab for error details. Common failure causes:
#   - npm registry temporarily unavailable (re-run manually)
#   - CHANGELOG.md moved or renamed upstream (update the URL in this file)
#   - obsidian-headless version string format changed in the Dockerfile
# =============================================================================

name: Check obsidian-headless Update

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: '0 8 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

# Only one update check at a time
concurrency:
  group: check-headless-update
  cancel-in-progress: false

jobs:
  check-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # Create branch and push commits
      pull-requests: write  # Open PRs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Extract the currently pinned version from the Dockerfile
      # ---------------------------------------------------------------
      - name: Get current version
        id: current
        run: |
          set -euo pipefail

          # Extract version from: npm install -g obsidian-headless@X.Y.Z
          # Uses grep -o + sed instead of grep -P (PCRE) for portability.
          CURRENT=$(grep -o 'obsidian-headless@[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*' Dockerfile \
            | sed 's/obsidian-headless@//')

          if [ -z "$CURRENT" ]; then
            echo "::error::Could not extract obsidian-headless version from Dockerfile. Expected a line like: npm install -g obsidian-headless@X.Y.Z"
            exit 1
          fi

          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current pinned version: ${CURRENT}"

      # ---------------------------------------------------------------
      # Query npm registry for the latest published version
      # ---------------------------------------------------------------
      - name: Get latest version from npm
        id: latest
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
        run: |
          set -euo pipefail

          REGISTRY_URL="https://registry.npmjs.org/obsidian-headless"

          # Download to a temp file to avoid storing the full registry
          # response (all versions + metadata) in a shell variable.
          REGISTRY_FILE=$(mktemp)
          trap 'rm -f "$REGISTRY_FILE"' EXIT

          if ! curl -fsSL -o "$REGISTRY_FILE" "$REGISTRY_URL"; then
            echo "::error::npm registry request failed for ${REGISTRY_URL}. The registry may be temporarily unavailable. Re-run this workflow manually once it recovers."
            exit 1
          fi

          LATEST=$(jq -r '.["dist-tags"].latest' "$REGISTRY_FILE")

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Could not determine latest version from npm registry"
            exit 1
          fi

          # Validate that the version is a valid semver string
          if ! printf '%s' "$LATEST" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Latest version '${LATEST}' is not a valid semver string (expected X.Y.Z)"
            exit 1
          fi

          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest npm version: ${LATEST}"

          # Extract gitHead SHAs for commit comparison links
          CURRENT_SHA=$(jq -r --arg v "$CURRENT_VERSION" '.versions[$v].gitHead // empty' "$REGISTRY_FILE")
          LATEST_SHA=$(jq -r --arg v "$LATEST" '.versions[$v].gitHead // empty' "$REGISTRY_FILE")

          echo "current_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_sha=${LATEST_SHA}" >> "$GITHUB_OUTPUT"

          # Extract dependency lists for both versions as compact JSON.
          # Written to temp files to avoid GITHUB_OUTPUT multiline issues.
          jq -c --arg v "$CURRENT_VERSION" '.versions[$v].dependencies // {}' "$REGISTRY_FILE" > /tmp/current_deps.json
          jq -c --arg v "$LATEST" '.versions[$v].dependencies // {}' "$REGISTRY_FILE" > /tmp/latest_deps.json

      # ---------------------------------------------------------------
      # Compare versions — exit early if already up to date
      # ---------------------------------------------------------------
      - name: Check if update needed
        id: check
        env:
          CURRENT: ${{ steps.current.outputs.version }}
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          set -euo pipefail

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date (${CURRENT}). Nothing to do."
            echo "needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Update available: ${CURRENT} → ${LATEST}"
          echo "needed=true" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # Check if an update PR already exists for this version
      # ---------------------------------------------------------------
      - name: Check for existing PR
        if: steps.check.outputs.needed == 'true'
        id: existing_pr
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          set -euo pipefail

          BRANCH="deps/obsidian-headless-${LATEST}"

          # Check if branch already exists on remote
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch ${BRANCH} already exists. Checking for open PR..."
            OPEN_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
            if [ -n "$OPEN_PR" ]; then
              echo "PR #${OPEN_PR} already open for this version. Skipping."
              echo "exists=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # Fetch the upstream CHANGELOG.md and extract relevant entries
      # ---------------------------------------------------------------
      - name: Fetch upstream changelog
        if: steps.check.outputs.needed == 'true' && steps.existing_pr.outputs.exists == 'false'
        id: changelog
        env:
          CURRENT: ${{ steps.current.outputs.version }}
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          set -euo pipefail

          # Fetch CHANGELOG.md from obsidianmd/obsidian-headless (master branch).
          # Non-fatal: if it fails, the PR body will note the missing changelog.
          CHANGELOG=$(curl -fsSL \
            "https://raw.githubusercontent.com/obsidianmd/obsidian-headless/master/CHANGELOG.md" \
            || true)

          if [ -z "$CHANGELOG" ]; then
            echo "Could not fetch upstream CHANGELOG.md — PR will note this."
            echo "_Could not fetch upstream CHANGELOG.md._" > /tmp/changelog_entries.txt
            exit 0
          fi

          # Extract changelog sections between current (exclusive) and latest (inclusive).
          # The CHANGELOG uses "## X.Y.Z" headers in descending order (newest first).
          #
          # Strategy: start capturing when we see any version header (newest first),
          # and stop permanently when we hit the current version header.
          # This correctly captures all entries for versions newer than current.
          #
          # Note: version comparison is string-based, which works for single-digit
          # semver components (0.0.x). If obsidian-headless reaches 0.10.x, this
          # will need a proper numeric comparison.
          printf '%s\n' "$CHANGELOG" | awk -v current="$CURRENT" '
            BEGIN { in_range = 0; found_current = 0 }
            /^## [0-9]+\.[0-9]+\.[0-9]+/ {
              ver = $2
              if (ver == current) { in_range = 0; found_current = 1; next }
              if (!found_current) { in_range = 1 }
              else { in_range = 0 }
            }
            in_range { print }
          ' > /tmp/changelog_entries.txt

          if [ ! -s /tmp/changelog_entries.txt ]; then
            echo "_No changelog entries found between ${CURRENT} and ${LATEST}._" > /tmp/changelog_entries.txt
          fi

      # ---------------------------------------------------------------
      # Build the dependency diff section
      # ---------------------------------------------------------------
      - name: Build dependency diff
        if: steps.check.outputs.needed == 'true' && steps.existing_pr.outputs.exists == 'false'
        id: depdiff
        run: |
          set -euo pipefail

          # Read dependency JSON from temp files (avoids shell injection
          # from GitHub Actions template expressions — see GitHub Actions
          # security best practices).
          CURRENT_DEPS=$(cat /tmp/current_deps.json)
          LATEST_DEPS=$(cat /tmp/latest_deps.json)

          jq -r -n \
            --argjson current "$CURRENT_DEPS" \
            --argjson latest "$LATEST_DEPS" '
            # Find all unique keys
            ([$current | keys[], $latest | keys[]] | unique) as $all_keys |
            [$all_keys[] |
              . as $key |
              ($current[$key] // null) as $old |
              ($latest[$key] // null) as $new |
              if $old == $new then empty
              elif $old == null then "- **Added**: `\($key)` \($new)"
              elif $new == null then "- **Removed**: `\($key)` ~~\($old)~~"
              else "- **Changed**: `\($key)` \($old) → \($new)"
              end
            ] | if length == 0 then "_No dependency changes._" else join("\n") end
          ' > /tmp/depdiff.txt

      # ---------------------------------------------------------------
      # Update the Dockerfile and create the PR
      # ---------------------------------------------------------------
      - name: Create update PR
        if: steps.check.outputs.needed == 'true' && steps.existing_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT: ${{ steps.current.outputs.version }}
          LATEST: ${{ steps.latest.outputs.version }}
          CURRENT_SHA: ${{ steps.latest.outputs.current_sha }}
          LATEST_SHA: ${{ steps.latest.outputs.latest_sha }}
        run: |
          set -euo pipefail

          BRANCH="deps/obsidian-headless-${LATEST}"

          # Configure git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch
          git checkout -b "$BRANCH"

          # Update the version in the Dockerfile.
          # Escape dots in the version strings for sed regex safety.
          CURRENT_ESC=$(printf '%s' "$CURRENT" | sed 's/\./\\./g')
          LATEST_ESC=$(printf '%s' "$LATEST" | sed 's/\./\\./g')
          sed -i "s/obsidian-headless@${CURRENT_ESC}/obsidian-headless@${LATEST_ESC}/" Dockerfile

          # Verify the change was made
          if ! grep -q "obsidian-headless@${LATEST}" Dockerfile; then
            echo "::error::Failed to update version in Dockerfile"
            exit 1
          fi

          # --- Build the PR body BEFORE pushing (so a body-construction
          # failure doesn't leave an orphan remote branch) ---

          CHANGELOG_ENTRIES=$(cat /tmp/changelog_entries.txt 2>/dev/null || echo "_Could not fetch changelog._")
          DEP_DIFF=$(cat /tmp/depdiff.txt 2>/dev/null || echo "_Could not compute dependency diff._")

          # Build commit comparison link if both SHAs are available.
          # Use cut instead of ${VAR:0:7} bashism for POSIX sh compatibility.
          COMMIT_LINK=""
          if [ -n "$CURRENT_SHA" ] && [ -n "$LATEST_SHA" ]; then
            CURRENT_SHORT=$(printf '%s' "$CURRENT_SHA" | cut -c1-7)
            LATEST_SHORT=$(printf '%s' "$LATEST_SHA" | cut -c1-7)
            COMMIT_LINK="- [View all commits (${CURRENT_SHORT}...${LATEST_SHORT})](https://github.com/obsidianmd/obsidian-headless/compare/${CURRENT_SHA}...${LATEST_SHA})"
          fi

          PR_BODY="/tmp/pr_body.md"
          {
            echo "## obsidian-headless ${CURRENT} → ${LATEST}"
            echo ""
            echo "A new version of [obsidian-headless](https://github.com/obsidianmd/obsidian-headless) has been published to npm."
            echo ""
            echo "> [!WARNING]"
            echo "> obsidian-headless is pre-stable (\`0.x\`). Breaking changes can land in any release. Review the changelog below before merging."
            echo ""
            echo "### Upstream changelog"
            echo ""
            echo "$CHANGELOG_ENTRIES"
            echo ""
            echo "### Dependency changes"
            echo ""
            echo "$DEP_DIFF"
            echo ""
            echo "### Links"
            echo ""
            echo "- [npm: obsidian-headless@${LATEST}](https://www.npmjs.com/package/obsidian-headless/v/${LATEST})"
            if [ -n "$COMMIT_LINK" ]; then
              echo "$COMMIT_LINK"
            fi
            echo "- [Upstream repo](https://github.com/obsidianmd/obsidian-headless)"
            echo "- [Upstream issues](https://github.com/obsidianmd/obsidian-headless/issues)"
            echo ""
            echo "### Before merging"
            echo ""
            echo "The failure mode for a bad obsidian-headless upgrade is **sync stops working**, not data loss. Obsidian Sync has server-side history and the git backup retains the last committed state."
            echo ""
            echo "- [ ] Review the changelog for breaking changes — especially mentions of the sync protocol, \`ob sync-config\`, or stored config format changes"
            echo "- [ ] Verify \`ob sync-config --file-types\` and \`--configs\` flags still accept the same values (our ADR-0017 workaround in init-config.sh depends on this)"
            echo "- [ ] If dependency changes include native modules (e.g., \`better-sqlite3\`), verify both amd64 and arm64 builds complete in CI"
            echo "- [ ] For E2EE vaults: check if credential storage format changed (keytar was removed in 0.0.3; a similar migration could affect stored passwords)"
            echo "- [ ] Smoke-test locally: \`docker build --build-arg TARGETARCH=amd64 -t obs-test . && docker run --rm obs-test ob --version\`"
            echo "- [ ] Check [upstream issues](https://github.com/obsidianmd/obsidian-headless/issues) for regressions reported after this release"
            echo "- [ ] After merging, confirm the Docker publish CI run completes and the new image is available on Docker Hub"
          } > "$PR_BODY"

          # --- Now push and create the PR ---
          git add Dockerfile
          git commit -m "deps: bump obsidian-headless ${CURRENT} → ${LATEST}"
          git push origin "$BRANCH"

          # Ensure labels exist (no-op if they already do)
          gh label create "dependencies" --description "Dependency updates" --color "0075ca" 2>/dev/null || true
          gh label create "automated" --description "Created by automation" --color "ededed" 2>/dev/null || true

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "deps: bump obsidian-headless ${CURRENT} → ${LATEST}" \
            --label "dependencies" \
            --label "automated" \
            --body-file "$PR_BODY"

          echo "PR created successfully."
