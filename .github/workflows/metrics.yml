# =============================================================================
# Docker Hub Pull Count Metrics
#
# Runs daily at 06:00 UTC. Fetches the aggregate pull_count from Docker Hub's
# public API and appends a date,count row to docs/metrics/pulls.csv.
#
# Privacy: Docker Hub's pull_count is a single anonymous aggregate counter.
# No individual user data, IPs, or identifiers are collected.
#
# The docker-publish.yml workflow ignores changes to docs/metrics/ via
# paths-ignore, so commits from this workflow do not trigger image builds.
# Bot commits are also filtered from release changelogs by author.
#
# Failure policy: if the Docker Hub API is unreachable or returns an error,
# the workflow fails and the CSV gets a gap for that day. This is acceptable
# — pull counts are a trend metric, not a critical data source. Re-run
# manually via workflow_dispatch to fill a gap if needed.
# =============================================================================

name: Record Docker Hub Pulls

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

# Serialise concurrent runs (e.g., manual trigger overlapping with cron).
# Don't cancel in-progress — let it finish, then run the next one.
concurrency:
  group: metrics-record
  cancel-in-progress: false

env:
  DOCKER_HUB_REPO: benedicteb/obsidian-git-backup

jobs:
  record-pulls:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # Needed to push the CSV update

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and record pull count
        id: fetch
        run: |
          set -euo pipefail

          API_URL="https://hub.docker.com/v2/repositories/${DOCKER_HUB_REPO}/"
          RESPONSE=$(curl -fsSL "$API_URL")
          COUNT=$(printf '%s' "$RESPONSE" | jq -r '.pull_count')

          # Validate that we got a number
          case "$COUNT" in
            ''|*[!0-9]*)
              echo "::error::Docker Hub API returned non-numeric pull_count: ${COUNT}"
              exit 1
              ;;
          esac

          DATE=$(date -u +%Y-%m-%d)
          CSV_FILE="docs/metrics/pulls.csv"

          # Validate CSV header integrity
          FIRST_LINE=$(head -1 "$CSV_FILE" 2>/dev/null || true)
          if [ "$FIRST_LINE" != "date,pull_count" ]; then
            echo "::error::${CSV_FILE} has unexpected first line: '${FIRST_LINE}'. Expected 'date,pull_count'. Check file integrity."
            exit 1
          fi

          # Skip if today's date is already recorded (idempotent on re-runs)
          if grep -q "^${DATE}," "$CSV_FILE" 2>/dev/null; then
            echo "Already recorded for ${DATE} — skipping."
            exit 0
          fi

          echo "${DATE},${COUNT}" >> "$CSV_FILE"
          echo "Recorded: ${DATE} → ${COUNT} pulls"

          # Pass count to the commit step for the commit message
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        env:
          PULL_COUNT: ${{ steps.fetch.outputs.count }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/metrics/pulls.csv

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(metrics): record daily pull count (${PULL_COUNT})"
          git push origin HEAD:main
