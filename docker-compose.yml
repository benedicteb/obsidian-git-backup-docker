# =============================================================================
# obsidian-git-backup-docker — Docker Compose
#
# Quick start:
#   1. Copy .env.example to .env and fill in the required values
#   2. docker compose up -d
#   3. Check logs: docker compose logs -f
#   4. On first run, copy the SSH public key from the logs and add it to
#      your git server. The container will retry automatically.
# =============================================================================

services:
  obsidian-backup:
    build: .
    container_name: obsidian-git-backup
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      # REQUIRED: Persists SSH keys across container restarts.
      # Without this, a new SSH key is generated on every restart.
      - obsidian-config:/config

      # OPTIONAL: Vault data. If not mounted, data is re-synced from
      # Obsidian Sync and re-cloned from git on container recreation.
      - obsidian-vault:/vault

volumes:
  obsidian-config:
  obsidian-vault:
